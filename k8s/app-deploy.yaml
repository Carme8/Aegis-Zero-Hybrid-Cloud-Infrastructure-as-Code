apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-api
  template:
    metadata:
      labels:
        app: aegis-api
    spec:
      containers:
      - name: api
        image: nginx:alpine # Qui metteremo il container Python
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-service
spec:
  type: NodePort
  selector:
    app: aegis-api
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080